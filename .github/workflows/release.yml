name: release

# Auto-publish the npm packages when code lands on `main` — but ONLY when the
# version in hub/npm/term-hub/package.json is new (npm rejects re-publishing
# an existing version). So the release flow is simply:
#   bump the version -> open PR -> merge to main -> this publishes it.
# Merges that don't change the version are a no-op (the build is skipped too).
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # Cheap gate: is term-hub@<version> already on npm? If yes, skip everything.
  check:
    runs-on: ubuntu-latest
    outputs:
      publish: ${{ steps.decide.outputs.publish }}
      version: ${{ steps.decide.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - id: decide
        run: |
          VER=$(node -p "require('./hub/npm/term-hub/package.json').version")
          echo "version=$VER" >> "$GITHUB_OUTPUT"
          if npm view "term-hub@$VER" version >/dev/null 2>&1; then
            echo "term-hub@$VER already published — nothing to do."
            echo "publish=false" >> "$GITHUB_OUTPUT"
          else
            echo "term-hub@$VER is new — will build + publish."
            echo "publish=true" >> "$GITHUB_OUTPUT"
          fi

  build:
    name: build ${{ matrix.key }}
    needs: check
    if: needs.check.outputs.publish == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: macos-14,         key: darwin-arm64, target: aarch64-apple-darwin }
          - { os: macos-13,         key: darwin-x64,   target: x86_64-apple-darwin }
          - { os: ubuntu-22.04,     key: linux-x64,    target: x86_64-unknown-linux-gnu }
          - { os: ubuntu-22.04-arm, key: linux-arm64,  target: aarch64-unknown-linux-gnu }
          # - { os: windows-latest, key: win32-x64, target: x86_64-pc-windows-msvc }  # phase 2
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux GUI deps
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev build-essential file libssl-dev pkg-config

      - uses: dtolnay/rust-toolchain@stable
        with: { targets: "${{ matrix.target }}" }
      - uses: Swatinem/rust-cache@v2
        with: { workspaces: hub }
      - uses: actions/setup-node@v4
        with: { node-version: 20 }

      - name: Build engine binaries
        working-directory: hub
        shell: bash
        run: |
          cargo build --release --target ${{ matrix.target }} -p hub-cli -p hub-daemon -p hub-relay
          # tauri.conf.json's bundle.resources references binaries/hub etc, and
          # tauri-build validates those paths exist (even with --no-bundle). The
          # local `prebuild:bins` copies from target/release; here we build with
          # an explicit --target, so copy from target/<triple>/release.
          EXT=""; [[ "${{ matrix.key }}" == win32-* ]] && EXT=".exe"
          mkdir -p app/src-tauri/binaries
          for b in hub hub-daemon hub-relay; do
            cp "target/${{ matrix.target }}/release/$b$EXT" "app/src-tauri/binaries/$b$EXT"
          done

      - name: Build GUI (prod, embedded frontend, no bundle)
        working-directory: hub/app
        run: |
          npm ci
          npm run build
          npx tauri build --no-bundle --target ${{ matrix.target }}

      - name: Stage binaries into the platform package
        shell: bash
        run: |
          OUT="hub/target/${{ matrix.target }}/release"
          DST="hub/npm/packages/${{ matrix.key }}/bin"
          mkdir -p "$DST"
          EXT=""; [[ "${{ matrix.key }}" == win32-* ]] && EXT=".exe"
          for b in hub hub-daemon hub-relay hub-app; do
            cp "$OUT/$b$EXT" "$DST/$b$EXT"
            chmod +x "$DST/$b$EXT" || true
          done
          rm -f "$DST/README.md"
          ls -l "$DST"

      - uses: actions/upload-artifact@v4
        with:
          name: pkg-${{ matrix.key }}
          path: hub/npm/packages/${{ matrix.key }}
          retention-days: 3

  publish:
    name: publish to npm
    needs: [check, build]
    if: needs.check.outputs.publish == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"

      - name: Download built platform packages
        uses: actions/download-artifact@v4
        with: { pattern: pkg-*, path: hub/npm/packages }

      - name: Flatten artifacts
        working-directory: hub/npm/packages
        run: |
          for d in pkg-*; do key="${d#pkg-}"; rm -rf "$key"; mv "$d" "$key"; done

      - name: Stamp version everywhere
        run: |
          node - "${{ needs.check.outputs.version }}" <<'NODE'
          const fs = require("fs"), path = require("path");
          const ver = process.argv[2], root = "hub/npm";
          const main = path.join(root, "term-hub", "package.json");
          const m = JSON.parse(fs.readFileSync(main));
          m.version = ver;
          for (const k of Object.keys(m.optionalDependencies || {})) m.optionalDependencies[k] = ver;
          fs.writeFileSync(main, JSON.stringify(m, null, 2) + "\n");
          for (const key of fs.readdirSync(path.join(root, "packages"))) {
            const p = path.join(root, "packages", key, "package.json");
            if (!fs.existsSync(p)) continue;
            const j = JSON.parse(fs.readFileSync(p)); j.version = ver;
            fs.writeFileSync(p, JSON.stringify(j, null, 2) + "\n");
          }
          console.log("stamped", ver);
          NODE

      - name: Publish (idempotent — skips anything already on npm)
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          publish_if_new() {
            local dir="$1"
            local name ver
            name=$(node -p "require('./$dir/package.json').name")
            ver=$(node -p "require('./$dir/package.json').version")
            if npm view "$name@$ver" version >/dev/null 2>&1; then
              echo "skip $name@$ver (already published)"
            else
              (cd "$dir" && npm publish --access public)
            fi
          }
          for key in hub/npm/packages/*/; do
            [ -n "$(ls -A "$key/bin" 2>/dev/null | grep -v README)" ] || { echo "skip $key (no binaries)"; continue; }
            publish_if_new "${key%/}"
          done
          publish_if_new hub/npm/term-hub
